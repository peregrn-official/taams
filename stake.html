<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }

  <script>
    const web3 = new Web3(window.ethereum || 'https://rpc-mumbai.polygon.technology');
    const contractAddress = '0x...'; // Remplacer par l'adresse du contrat
    const contractABI = [
      { "constant": true, "inputs": [{ "name": "account", "type": "address" }], "name": "getStakingInfo", "outputs": [{ "type": "uint256", "name": "amount" }, { "type": "bool", "name": "boostActive" }], "type": "function" },
      { "constant": false, "inputs": [{ "name": "amount", "type": "uint256" }], "name": "stake", "type": "function" },
      { "constant": false, "inputs": [], "name": "unstake", "type": "function" },
      { "constant": false, "inputs": [{ "name": "spender", "type": "address" }, { "name": "amount", "type": "uint256" }], "name": "approve", "type": "function" },
      { "constant": true, "inputs": [{ "name": "owner", "type": "address" }, { "name": "spender", "type": "address" }], "name": "allowance", "outputs": [{ "type": "uint256" }], "type": "function" }
    ];
    const contract = new web3.eth.Contract(contractABI, contractAddress);

    // Mobile Menu
    document.getElementById('mobileMenuBtn').onclick = () => {
      document.getElementById('mobileMenu').classList.toggle('hidden');
    };

    // Wallet Connect
    async function connectWallet() {
      if (window.ethereum) {
        try {
          const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
          const address = accounts[0];
          const balance = await web3.eth.getBalance(address);
          document.getElementById('walletAddress').textContent = `Connecté : ${address.slice(0, 6)}...${address.slice(-4)} (${web3.utils.fromWei(balance, 'ether')} ETH)`;
          document.getElementById('connectWallet').textContent = 'Connecté';
          localStorage.setItem('walletAddress', address);

          const message = "TAAMS - Identification Web3";
          const signature = await window.ethereum.request({
            method: 'personal_sign',
            params: [message, address]
          });
          console.log('Signature:', signature);
        } catch (error) {
          console.error('Erreur lors de la connexion:', error);
          alert('Erreur lors de la connexion à MetaMask.');
        }
      } else {
        alert('MetaMask n’est pas installé !');
      }
    }

    document.getElementById('connectWallet').onclick = connectWallet;

    if (localStorage.getItem('walletAddress')) {
      document.getElementById('walletAddress').textContent = `Connecté : ${localStorage.getItem('walletAddress').slice(0, 6)}...${localStorage.getItem('walletAddress').slice(-4)}`;
      document.getElementById('connectWallet').textContent = 'Connecté';
    }

    // Load Staking Info
    async function loadStakingInfo() {
      if (window.ethereum) {
        try {
          const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
          const address = accounts[0];
          const stakingInfo = await contract.methods.getStakingInfo(address).call() || { amount: '0', boostActive: false };
          document.getElementById('stakedAmount').textContent = `${web3.utils.fromWei(stakingInfo.amount, 'ether')} TAAMS`;
          document.getElementById('boostStatus').textContent = `Boost BL2P : ${stakingInfo.boostActive ? 'Actif' : 'Inactif'}`;
        } catch (error) {
          console.error('Erreur lors du chargement des infos de staking:', error);
        }
      }
    }

    document.getElementById('stakeBtn').onclick = async function() {
      const amount = document.getElementById('stakeAmount').value;
      if (window.ethereum && amount > 0) {
        try {
          const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
          const address = accounts[0];
          const allowance = await contract.methods.allowance(address, contractAddress).call();
          if (allowance < web3.utils.toWei(amount, 'ether')) {
            await contract.methods.approve(contractAddress, web3.utils.toWei(amount, 'ether')).send({ from: address });
          }
          await contract.methods.stake(web3.utils.toWei(amount, 'ether')).send({ from: address });
          alert('Staking effectué !');
          loadStakingInfo();
        } catch (error) {
          console.error('Erreur lors du staking:', error);
          alert('Erreur lors du staking.');
        }
      } else {
        alert('Veuillez entrer un montant valide.');
      }
    };

    document.getElementById('unstakeBtn').onclick = async function() {
      if (window.ethereum) {
        try {
          const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
          const address = accounts[0];
          await contract.methods.unstake().send({ from: address });
          alert('Unstake effectué !');
          loadStakingInfo();
        } catch (error) {
          console.error('Erreur lors de l’unstake:', error);
          alert('Erreur lors de l’unstake.');
        }
      }
    };

    window.onload = loadStakingInfo;
  </script>
