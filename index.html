<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Taams – Assistant Futuriste</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header>
    <img src="assets/logo.svg" alt="Taams Logo" class="logo" />
    <select id="langSwitch">
      <option value="fr">🇫🇷 Français</option>
      <option value="en">🇬🇧 English</option>
    </select>
  </header>

  <main>
    <section id="time-weather">
      <h2 data-i18n="timeWeather">🕐 Heure & 🌤️ Météo</h2>
      <p id="clock">...</p>
      <p id="weather">...</p>
    </section>

    <section id="news">
      <h2 data-i18n="news">🗞️ Actualité</h2>
      <p id="headline">...</p>
    </section>

    <section id="assistant">
      <h2 data-i18n="talk">💬 Parle à Taams</h2>
      <iframe
        src="https://taams-deepseek.hf.space"
        width="100%"
        height="600"
        style="border:none; border-radius:12px; box-shadow:0 0 15px rgba(0,0,0,0.1);"
        title="Taams - Assistant IA">
      </iframe>
    </section>
  </main>

  <!-- 🛸 Bouton flottant -->
  <button id="taamsToggle">🛸 Taams</button>

  <!-- 💬 Conteneur du chatbot flottant -->
  <div id="taamsContainer">
    <iframe
      src="https://taams-deepseek.hf.space"
      title="Taams Assistant IA"
      allow="clipboard-write"
      style="width:100%; height:100%; border:none; border-radius:12px;">
    </iframe>
    <button id="taamsClose">✖</button>
  </div>

  <!-- Script JS -->
  <script src="script.js"></script>
</body>
</html>
