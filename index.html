<!DOCTYPE html>
<html lang="fr">
<head>
  <!-- ... (même head que précédemment) ... -->
  <style>
    /* Ajouts spécifiques mobile */
    @media (max-width: 768px) {
      .badge-card {
        width: 100%;
        margin-bottom: 15px;
      }
      
      #walletBtn {
        padding: 10px 15px;
        font-size: 14px;
      }
      
      /* Empêcher le zoom sur les inputs */
      input, select, textarea {
        font-size: 16px !important;
      }
    }
    
    /* Correction du viewport mobile */
    meta[name="viewport"] {
      content: "width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no";
    }
  </style>
</head>
<body>
  <!-- Ajouter ce message d'état -->
  <div id="connectionStatus" class="alert alert-info fixed-top text-center d-none">
    <i class="fas fa-sync-alt fa-spin me-2"></i>
    <span id="statusText">Connexion en cours...</span>
  </div>

  <!-- ... (reste du HTML existant) ... -->

  <script>
    // Détection mobile et gestion des erreurs
    if (/Android|iPhone|iPad/i.test(navigator.userAgent)) {
      // Solution pour le rafraîchissement
      window.addEventListener('beforeunload', function() {
        localStorage.setItem('taams_demo_state', JSON.stringify(state.demoData));
      });
      
      // Restauration de l'état au chargement
      document.addEventListener('DOMContentLoaded', function() {
        const savedState = localStorage.getItem('taams_demo_state');
        if (savedState) {
          state.demoData = JSON.parse(savedState);
          updateUI();
        }
      });
    }
  </script>
</body>
</html>
