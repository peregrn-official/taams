<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAAMS DApp</title>
  <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --primary: #6e48aa;
      --secondary: #9d50bb;
      --dark: #1a1a2e;
      --light: #f1f1f1;
    }
    body { background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; }
    .card { background: rgba(0,0,0,0.2); backdrop-filter: blur(10px); border: 1px solid rgba(110,72,170,0.3); }
    .btn-primary { background: var(--primary); border: none; }
    .btn-primary:hover { background: var(--secondary); }
    .connected { background: var(--secondary) !important; }
    .progress { height: 25px; margin: 10px 0; background: rgba(110,72,170,0.2); }
    .progress-bar { background: linear-gradient(to right, var(--primary), var(--secondary)); }
    .badge-img { width: 80px; transition: transform 0.3s; margin: 5px; }
    .badge-img:hover { transform: scale(1.1); }
    #walletBtn.connected { background: var(--secondary); }
    .error { color: #ff6b6b; margin-top: 5px; font-size: 0.9rem; }
    
    /* Roadmap Verticale */
    .vertical-roadmap {
      background: rgba(26, 26, 46, 0.7);
      border-radius: 10px;
      padding: 12px 15px;
      border: 1px solid rgba(110, 72, 170, 0.3);
      backdrop-filter: blur(5px);
      margin-bottom: 20px;
    }
    .roadmap-title {
      color: #9d50bb;
      font-size: 1rem;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
    }
    .roadmap-progress {
      display: flex;
      justify-content: space-between;
      position: relative;
    }
    .roadmap-progress::before {
      content: '';
      position: absolute;
      top: 14px;
      left: 0;
      right: 0;
      height: 2px;
      background: rgba(110, 72, 170, 0.3);
      z-index: 1;
    }
    .roadmap-item {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 23%;
    }
    .roadmap-badge {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--dark);
      border: 2px solid var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      margin-bottom: 5px;
    }
    .roadmap-item.completed .roadmap-badge {
      background: var(--primary);
      border-color: var(--secondary);
      color: white;
    }
    .roadmap-item.current .roadmap-badge {
      background: var(--secondary);
      border-color: var(--primary);
      animation: pulse 2s infinite;
    }
    .roadmap-text {
      font-size: 0.7rem;
      text-align: center;
      color: rgba(255,255,255,0.7);
      line-height: 1.2;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(157, 80, 187, 0.4); }
      70% { box-shadow: 0 0 0 6px rgba(157, 80, 187, 0); }
      100% { box-shadow: 0 0 0 0 rgba(157, 80, 187, 0); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .roadmap-text { font-size: 0.6rem; }
      .card { margin-bottom: 15px; }
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="d-flex justify-content-between mb-4 align-items-center">
      <h1><i class="fas fa-coins me-2"></i>TAAMS DApp</h1>
      <button id="walletBtn" class="btn btn-primary">
        <i class="fas fa-wallet me-2"></i>Connecter Wallet
      </button>
    </div>

    <div id="errorAlert" class="alert alert-danger d-none"></div>

    <!-- Roadmap Verticale -->
    <div class="vertical-roadmap">
      <h5 class="roadmap-title"><i class="fas fa-route me-2"></i>Roadmap TAAMS</h5>
      <div class="roadmap-progress">
        <div class="roadmap-item completed">
          <span class="roadmap-badge"><i class="fas fa-check"></i></span>
          <span class="roadmap-text">Lancement</span>
        </div>
        <div class="roadmap-item current">
          <span class="roadmap-badge"><i class="fas fa-spinner fa-pulse"></i></span>
          <span class="roadmap-text">Badges NFT</span>
        </div>
        <div class="roadmap-item">
          <span class="roadmap-badge">3</span>
          <span class="roadmap-text">Marketplace</span>
        </div>
        <div class="roadmap-item">
          <span class="roadmap-badge">4</span>
          <span class="roadmap-text">DAO</span>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-8">
        <div class="card p-3 mb-4">
          <h3><i class="fas fa-wallet me-2"></i>Votre Portefeuille</h3>
          <p>Solde TAAMS: <span id="tokenBalance">0</span></p>
          <p>Staké: <span id="stakedAmount">0</span></p>
          <p>Récompenses: <span id="rewards">0</span></p>
        </div>

        <div class="card p-3">
          <h3><i class="fas fa-lock me-2"></i>Staking</h3>
          <div class="mb-3">
            <input id="stakeInput" type="number" class="form-control" placeholder="Montant TAAMS">
            <small class="error" id="stakeError"></small>
          </div>
          <button id="stakeBtn" class="btn btn-primary me-2">
            <i class="fas fa-plus-circle me-1"></i>Staker
          </button>
          <button id="claimBtn" class="btn btn-success me-2">
            <i class="fas fa-hand-holding-usd me-1"></i>Claim
          </button>
          <button id="unstakeBtn" class="btn btn-danger">
            <i class="fas fa-unlock me-1"></i>Unstake
          </button>
          
          <div class="mt-3">
            <h5><i class="fas fa-trophy me-2"></i>Niveau actuel: <span id="currentLevel">0</span></h5>
            <div class="progress">
              <div id="levelProgress" class="progress-bar" style="width: 0%"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card p-3">
          <h3><i class="fas fa-award me-2"></i>Badges NFT</h3>
          <div id="badgesContainer" class="d-flex flex-wrap justify-content-center"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="contracts.js"></script>
  <script src="app.js"></script>
</body>
</html>
