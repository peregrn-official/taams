<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAAMS DApp</title>
  <script src="https://cdn.jsdelivr.net/npm/web3@1.5.2/dist/web3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #6e48aa;
      --secondary: #9d50bb;
    }
    body { background: #1a1a2e; color: white; }
    .card { background: rgba(0,0,0,0.2); backdrop-filter: blur(10px); }
    .btn-primary { background: var(--primary); border: none; }
    .progress { height: 25px; }
    .badge-img { width: 80px; transition: transform 0.3s; }
    .badge-img:hover { transform: scale(1.1); }
    #walletBtn.success { background: var(--secondary); }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="d-flex justify-content-between mb-4">
      <h1>TAAMS DApp</h1>
      <button id="walletBtn" class="btn btn-primary">Connecter Wallet</button>
    </div>

    <div class="row">
      <div class="col-md-8">
        <div class="card p-3 mb-4">
          <h3>Votre Portefeuille</h3>
          <p>Solde TAAMS: <span id="tokenBalance">0</span></p>
          <p>Staké: <span id="stakedAmount">0</span></p>
          <p>Récompenses: <span id="rewards">0</span></p>
        </div>

        <div class="card p-3">
          <h3>Staking</h3>
          <div class="mb-3">
            <input id="stakeInput" type="number" class="form-control" placeholder="Montant">
          </div>
          <button id="stakeBtn" class="btn btn-primary me-2">Staker</button>
          <button id="claimBtn" class="btn btn-success me-2">Claim</button>
          <button id="unstakeBtn" class="btn btn-danger">Unstake</button>
          <div class="mt-3">
            <h5>Niveau actuel: <span id="currentLevel">0</span></h5>
            <div class="progress">
              <div id="levelProgress" class="progress-bar" style="width: 0%"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card p-3">
          <h3>Badges NFT</h3>
          <div id="badgesContainer" class="d-flex flex-wrap"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
