<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAAMS DApp Demo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --primary: #6e48aa;
      --secondary: #9d50bb;
      --dark: #1a1a2e;
      --light: #f1f1f1;
    }
    body {
      background: var(--dark);
      color: white;
      font-family: 'Segoe UI', sans-serif;
    }
    .glass-card {
      background: rgba(0,0,0,0.2);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(110,72,170,0.3);
      border-radius: 16px;
    }
    #loadingScreen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
    }
  </style>
</head>
<body>
  <div id="loadingScreen">
    <div class="spinner-border text-primary"></div>
  </div>

  <div class="container py-4" id="appContent" style="display:none;">
    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1><i class="fas fa-coins me-2"></i>TAAMS Demo</h1>
      <button id="walletBtn" class="btn btn-primary">
        <i class="fas fa-wallet me-2"></i>Connecter Wallet
      </button>
    </div>

    <div class="row">
      <div class="col-lg-8">
        <div class="glass-card p-4 mb-4">
          <h3><i class="fas fa-wallet me-2"></i>Portefeuille Démo</h3>
          <div class="row mt-3">
            <div class="col-md-4">
              <div class="glass-card p-3 text-center">
                <small>Solde TAAMS</small>
                <h3 id="tokenBalance">1000</h3>
              </div>
            </div>
            <div class="col-md-4">
              <div class="glass-card p-3 text-center">
                <small>Montant Staké</small>
                <h3 id="stakedAmount">0</h3>
              </div>
            </div>
            <div class="col-md-4">
              <div class="glass-card p-3 text-center">
                <small>Récompenses</small>
                <h3 id="rewards">0</h3>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="glass-card p-4">
          <h3><i class="fas fa-trophy me-2"></i>Badges Démo</h3>
          <div id="badgesContainer" class="d-flex flex-wrap gap-3 mt-3"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
