<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TAAMS DApp</title>
  <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #6e48aa;
      --secondary: #9d50bb;
    }
    body { background: #1a1a2e; color: white; }
    .card { background: rgba(0,0,0,0.2); backdrop-filter: blur(10px); }
    .btn-primary { background: var(--primary); border: none; }
    .btn-primary:hover { background: var(--secondary); }
    .connected { background: var(--secondary) !important; }
    .progress { height: 25px; margin: 10px 0; }
    .badge-img { width: 80px; transition: transform 0.3s; margin: 5px; }
    .badge-img:hover { transform: scale(1.1); }
    #walletBtn.connected { background: var(--secondary); }
    .error { color: #ff6b6b; margin-top: 5px; }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="d-flex justify-content-between mb-4 align-items-center">
      <h1>TAAMS DApp</h1>
      <!-- À placer dans index.html avant la section principale -->
<section class="roadmap-section py-4">
  <div class="container">
    <h2 class="text-center mb-5"><i class="fas fa-map-marked-alt me-2"></i>Feuille de Route TAAMS</h2>
    
    <div class="roadmap-steps">
      <!-- Étape 1 -->
      <div class="step completed">
        <div class="step-icon"><i class="fas fa-rocket"></i></div>
        <div class="step-content">
          <h4>Q3 2023</h4>
          <ul>
            <li><i class="fas fa-check-circle"></i> Lancement du token</li>
            <li><i class="fas fa-check-circle"></i> Staking V1</li>
          </ul>
        </div>
      </div>

      <!-- Étape 2 -->
      <div class="step current">
        <div class="step-icon"><i class="fas fa-layer-group"></i></div>
        <div class="step-content">
          <h4>Q4 2023</h4>
          <ul>
            <li><i class="fas fa-spinner"></i> Badges NFT</li>
            <li><i class="fas fa-spinner"></i> Marketplace</li>
          </ul>
        </div>
      </div>

      <!-- Étape 3 -->
      <div class="step">
        <div class="step-icon"><i class="fas fa-expand"></i></div>
        <div class="step-content">
          <h4>Q1 2024</h4>
          <ul>
            <li><i class="far fa-circle"></i> Intégration Multi-Chaîne</li>
            <li><i class="far fa-circle"></i> DAO Governance</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</section>

<style>
.roadmap-section {
  background: linear-gradient(135deg, rgba(110,72,170,0.2) 0%, rgba(157,80,187,0.3) 100%);
  border-top: 1px solid rgba(255,255,255,0.1);
  border-bottom: 1px solid rgba(255,255,255,0.1);
}

.roadmap-steps {
  position: relative;
  max-width: 800px;
  margin: 0 auto;
}

.roadmap-steps::before {
  content: '';
  position: absolute;
  top: 0;
  left: 60px;
  height: 100%;
  width: 3px;
  background: linear-gradient(to bottom, #6e48aa, #9d50bb);
}

.step {
  position: relative;
  padding-left: 100px;
  margin-bottom: 40px;
}

.step-icon {
  position: absolute;
  left: 30px;
  top: 0;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  background: #1a1a2e;
  border: 3px solid #6e48aa;
  color: #9d50bb;
}

.step.completed .step-icon {
  background: #6e48aa;
  color: white;
  border-color: #9d50bb;
}

.step.current .step-icon {
  animation: pulse 2s infinite;
  background: #9d50bb;
  color: white;
  border-color: #6e48aa;
}

.step-content {
  background: rgba(26, 26, 46, 0.8);
  padding: 20px;
  border-radius: 10px;
  backdrop-filter: blur(5px);
  border: 1px solid rgba(110, 72, 170, 0.3);
}

.step-content h4 {
  color: #9d50bb;
  margin-top: 0;
}

.step-content ul {
  padding-left: 20px;
  color: rgba(255,255,255,0.8);
}

.step-content li {
  margin-bottom: 8px;
}

.fa-check-circle {
  color: #4CAF50;
}

.fa-spinner {
  color: #FFC107;
}

.fa-circle {
  color: rgba(255,255,255,0.3);
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(157, 80, 187, 0.7); }
  70% { box-shadow: 0 0 0 10px rgba(157, 80, 187, 0); }
  100% { box-shadow: 0 0 0 0 rgba(157, 80, 187, 0); }
}

@media (max-width: 768px) {
  .roadmap-steps::before {
    left: 30px;
  }
  .step {
    padding-left: 70px;
  }
  .step-icon {
    left: 0;
    width: 50px;
    height: 50px;
    font-size: 20px;
  }
}
</style>

<!-- Ajouter Font Awesome en haut de votre HTML -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<!-- CSS à ajouter dans le <style> existant -->
<style>
.roadmap-banner {
  background: linear-gradient(135deg, #6e48aa, #9d50bb);
  border-radius: 15px;
  padding: 20px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
}

.timeline {
  display: flex;
  justify-content: space-between;
  position: relative;
}

.timeline::before {
  content: '';
  position: absolute;
  top: 20px;
  left: 0;
  right: 0;
  height: 4px;
  background: rgba(255,255,255,0.3);
  z-index: 1;
}

.timeline-item {
  position: relative;
  z-index: 2;
  width: 30%;
  text-align: center;
}

.timeline-point {
  width: 40px;
  height: 40px;
  margin: 0 auto 10px;
  border-radius: 50%;
  background: #fff;
  color: #6e48aa;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 1.2rem;
  box-shadow: 0 0 0 4px rgba(255,255,255,0.3);
}

.timeline-item.completed .timeline-point {
  background: #4CAF50;
  color: white;
}

.timeline-item.active .timeline-point {
  background: #FFC107;
  color: #1a1a2e;
  transform: scale(1.1);
}

.timeline-content {
  background: rgba(0,0,0,0.3);
  padding: 15px;
  border-radius: 10px;
  backdrop-filter: blur(5px);
}

.timeline-content h5 {
  color: white;
  margin-top: 0;
}

.timeline-content p {
  color: rgba(255,255,255,0.8);
  font-size: 0.9rem;
  margin-bottom: 0;
}

@media (max-width: 768px) {
  .timeline {
    flex-direction: column;
  }
  .timeline-item {
    width: 100%;
    margin-bottom: 20px;
  }
  .timeline::before {
    display: none;
  }
}
</style>
      <button id="walletBtn" class="btn btn-primary">Connecter Wallet</button>
    </div>

    <div id="errorAlert" class="alert alert-danger d-none"></div>

    <div class="row">
      <div class="col-md-8">
        <div class="card p-3 mb-4">
          <h3>Votre Portefeuille</h3>
          <p>Solde TAAMS: <span id="tokenBalance">0</span></p>
          <p>Staké: <span id="stakedAmount">0</span></p>
          <p>Récompenses: <span id="rewards">0</span></p>
        </div>

        <div class="card p-3">
          <h3>Staking</h3>
          <div class="mb-3">
            <input id="stakeInput" type="number" class="form-control" placeholder="Montant TAAMS">
            <small class="error" id="stakeError"></small>
          </div>
          <button id="stakeBtn" class="btn btn-primary me-2">Staker</button>
          <button id="claimBtn" class="btn btn-success me-2">Claim</button>
          <button id="unstakeBtn" class="btn btn-danger">Unstake</button>
          
          <div class="mt-3">
            <h5>Niveau actuel: <span id="currentLevel">0</span></h5>
            <div class="progress">
              <div id="levelProgress" class="progress-bar" style="width: 0%"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-4">
        <div class="card p-3">
          <h3>Badges NFT</h3>
          <div id="badgesContainer" class="d-flex flex-wrap justify-content-center"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="contracts.js"></script>
  <script src="app.js"></script>
</body>
</html>
