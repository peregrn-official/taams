<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TAAMS DApp v2.5.1</title>
  <script src="https://cdn.jsdelivr.net/npm/web3@1.8.0/dist/web3.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root {
      --primary: #6e48aa;
      --secondary: #9d50bb;
      --dark: #1a1a2e;
      --light: #f1f1f1;
    }
    body { 
      background: var(--dark); 
      color: white; 
      font-family: 'Segoe UI', sans-serif; 
      touch-action: manipulation;
      overflow-x: hidden;
    }
    .container {
      padding-bottom: 80px;
    }
    .card { 
      background: rgba(0,0,0,0.2); 
      backdrop-filter: blur(5px); 
      border: 1px solid rgba(110,72,170,0.3); 
      margin-bottom: 20px;
    }
    .btn-primary { 
      background: var(--primary); 
      border: none; 
      white-space: nowrap;
    }
    .btn-primary:hover { background: var(--secondary); }
    .connected { background: var(--secondary) !important; }
    
    /* Badges */
    .badge-container {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 15px;
      margin-top: 20px;
    }
    .badge-card {
      background: rgba(26, 26, 46, 0.8);
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      width: 150px;
      border: 2px solid;
      transition: all 0.3s ease;
    }
    .badge-card.active {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(157, 80, 187, 0.5);
    }
    .badge-icon {
      font-size: 2rem;
      margin-bottom: 10px;
    }
    
    /* Roadmap */
    .roadmap-container {
      display: flex;
      justify-content: space-between;
      position: relative;
      margin: 25px 0;
    }
    .roadmap-container::before {
      content: '';
      position: absolute;
      top: 20px;
      left: 0;
      right: 0;
      height: 3px;
      background: rgba(110,72,170,0.3);
      z-index: 1;
    }
    .roadmap-item {
      position: relative;
      z-index: 2;
      text-align: center;
      width: 23%;
    }
    .roadmap-badge {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--dark);
      border: 3px solid var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
    }
    .roadmap-item.completed .roadmap-badge {
      background: var(--primary);
      border-color: var(--secondary);
    }
    .roadmap-item.current .roadmap-badge {
      animation: pulse 2s infinite;
      background: var(--secondary);
    }
    
    /* Snake Game */
    #gameModal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #snakeCanvas {
      border: 2px solid var(--primary);
      max-width: 100%;
      max-height: 60vh;
    }
    .game-controls {
      margin-top: 20px;
      text-align: center;
    }
    .touch-controls {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      gap: 10px;
      margin: 15px 0;
    }
    .touch-btn {
      background: rgba(110, 72, 170, 0.5);
      border: none;
      color: white;
      height: 50px;
      border-radius: 8px;
      font-size: 24px;
      touch-action: manipulation;
    }
    .touch-btn:active {
      background: rgba(110, 72, 170, 0.8);
    }
    
    /* Loading */
    #loadingIndicator {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid var(--primary);
      border-top-color: var(--secondary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    /* Responsive */
    @media (max-width: 768px) {
      .badge-card {
        width: 120px;
        padding: 10px;
      }
      .roadmap-item {
        font-size: 0.9rem;
      }
      .roadmap-badge {
        width: 30px;
        height: 30px;
      }
      .touch-btn {
        height: 40px;
        font-size: 20px;
      }
    }
    
    @keyframes pulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(157,80,187,0.4); }
      70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(157,80,187,0); }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(157,80,187,0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Loading Indicator -->
  <div id="loadingIndicator" class="d-none">
    <div class="spinner"></div>
  </div>

  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1><i class="fas fa-coins me-2"></i>TAAMS DApp</h1>
      <button id="walletBtn" class="btn btn-primary">
        <i class="fas fa-wallet me-2"></i>Connecter Wallet
      </button>
    </div>

    <div id="errorAlert" class="alert alert-danger d-none mb-4"></div>

    <!-- Roadmap Section -->
    <div class="card p-3">
      <h3><i class="fas fa-map-marked-alt me-2"></i>Roadmap TAAMS</h3>
      <div class="roadmap-container">
        <div class="roadmap-item completed">
          <div class="roadmap-badge"><i class="fas fa-check"></i></div>
          <div>Lancement</div>
        </div>
        <div class="roadmap-item current">
          <div class="roadmap-badge"><i class="fas fa-spinner"></i></div>
          <div>Badges</div>
        </div>
        <div class="roadmap-item">
          <div class="roadmap-badge">3</div>
          <div>Jeux</div>
        </div>
        <div class="roadmap-item">
          <div class="roadmap-badge">4</div>
          <div>DAO</div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-lg-8">
        <!-- Wallet & Staking Section -->
        <div class="card p-3 mb-4">
          <h3><i class="fas fa-wallet me-2"></i>Votre Portefeuille</h3>
          <div class="mb-3">
            <p>Solde TAAMS: <span id="tokenBalance" class="fw-bold">0</span></p>
            <p>Staké: <span id="stakedAmount" class="fw-bold">0</span></p>
            <p>Récompenses: <span id="rewards" class="fw-bold">0</span></p>
          </div>
          
          <h3><i class="fas fa-lock me-2"></i>Staking</h3>
          <div class="mb-3">
            <input id="stakeInput" type="number" class="form-control mb-2" placeholder="Montant TAAMS" inputmode="decimal">
            <div id="stakeError" class="text-danger small mb-2 d-none"></div>
            <div class="d-flex gap-2">
              <button id="stakeBtn" class="btn btn-primary flex-grow-1"><i class="fas fa-plus me-1"></i>Staker</button>
              <button id="unstakeBtn" class="btn btn-danger flex-grow-1"><i class="fas fa-minus me-1"></i>Retirer</button>
            </div>
          </div>
          <button id="claimBtn" class="btn btn-success w-100"><i class="fas fa-hand-holding-usd me-1"></i>Claim Récompenses</button>
          
          <div class="mt-3">
            <h5><i class="fas fa-trophy me-2"></i>Niveau: <span id="currentLevel">Nouveau</span></h5>
            <div class="progress" style="height: 20px;">
              <div id="levelProgress" class="progress-bar" style="width: 0%"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-4">
        <!-- Game Section -->
        <div class="card p-3 mb-4">
          <h3><i class="fas fa-gamepad me-2"></i>Mini-Jeu</h3>
          <button id="playSnakeBtn" class="btn btn-primary w-100 mb-3">
            <i class="fas fa-play me-1"></i>Jouer au Snake
          </button>
          
          <!-- Badges Section -->
          <h3><i class="fas fa-award me-2"></i>Vos Badges</h3>
          <div id="badgesContainer" class="badge-container"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Snake Game Modal -->
  <div id="gameModal">
    <canvas id="snakeCanvas"></canvas>
    <div class="game-controls">
      <p id="gameScore" class="fs-4">Score: 0</p>
      
      <div class="touch-controls">
        <div></div>
        <button class="touch-btn" data-direction="up">↑</button>
        <div></div>
        <button class="touch-btn" data-direction="left">←</button>
        <div></div>
        <button class="touch-btn" data-direction="right">→</button>
        <div></div>
        <button class="touch-btn" data-direction="down">↓</button>
        <div></div>
      </div>
      
      <div class="d-flex gap-2">
        <button id="restartGameBtn" class="btn btn-success flex-grow-1">
          <i class="fas fa-redo me-1"></i>Rejouer
        </button>
        <button id="closeGameBtn" class="btn btn-danger flex-grow-1">
          <i class="fas fa-times me-1"></i>Quitter
        </button>
      </div>
    </div>
  </div>

  <script src="contracts.js"></script>
  <script src="app.js"></script>
</body>
</html>
